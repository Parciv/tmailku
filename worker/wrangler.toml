name = "tmailku"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Ganti id di bawah dengan hasil `wrangler d1/kv/r2 create`
[[d1_databases]]
binding = "DB"
database_name = "tmailku"
database_id = "cba009a6-f05a-45f7-a131-33e1ece1f1ab"

[[kv_namespaces]]
binding = "KV"
id = "2d4d458270654ed1927dae982e1f6428"

[[r2_buckets]]
binding = "R2"
bucket_name = "tmailku-attachments"

[vars]
APP_URL = "https://stardue.site"
WEB_ORIGIN = "https://stardue.site"

# Cron: poll IMAP + cleanup TTL setiap 2 menit
[triggers]
crons = ["*/2 * * * *"]

# Secret (set via: wrangler secret put JWT_SECRET)
#   JWT_SECRET   -> kunci tanda tangan session admin
